# /etc/nginx/sites-available/squeeze-finder
# Drop-in nginx server block for the squeeze-finder FastAPI backend.
# After placing this file, symlink into sites-enabled/ and run certbot to add TLS:
#   sudo ln -s /etc/nginx/sites-available/squeeze-finder /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d SQUEEZE_HOST  (rewrites this block to add 443/TLS automatically)

server {
    listen 80;
    listen [::]:80;
    server_name SQUEEZE_HOST;

    # Buffer + keepalive knobs safe for our traffic profile
    client_max_body_size 1m;
    keepalive_timeout 65s;

    # Main proxy — everything goes to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # scans/narratives can be slow on cold cache
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 180s;

        # don't buffer streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health endpoint: quiet logs, same proxy
    location = /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:8100/api/health;
    }

    # Let's Encrypt HTTP-01 ACME webroot, if you prefer webroot over --nginx
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
